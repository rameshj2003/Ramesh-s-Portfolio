<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Study Timer</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  background: #0a0a12;
  color: #f0efe8;
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
}

/* ── Background ── */
.bg {
  position: fixed;
  inset: 0;
  z-index: 0;
}

.bg img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center top;
  display: block;
  filter: brightness(0.38) saturate(1.1);
}

.bg-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom,
    rgba(5,5,18,0.45) 0%,
    rgba(5,5,18,0.2) 30%,
    rgba(5,5,18,0.55) 75%,
    rgba(5,5,18,0.88) 100%
  );
}

/* ── Layout ── */
.page {
  position: relative;
  z-index: 2;
  width: 100%;
  max-width: 640px;
  padding: 2rem 1.2rem 5rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1.2rem;
}

/* ── Header ── */
header {
  text-align: center;
}

header h1 {
  font-size: 2rem;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: #fff;
  text-shadow: 0 2px 24px rgba(255,200,80,0.4);
}

header p {
  font-size: 0.88rem;
  color: rgba(255,255,255,0.45);
  margin-top: 0.3rem;
}

/* ── Glass card ── */
.card {
  background: rgba(10,10,22,0.78);
  backdrop-filter: blur(22px);
  -webkit-backdrop-filter: blur(22px);
  border: 0.5px solid rgba(255,255,255,0.12);
  border-radius: 20px;
  padding: 2rem 1.8rem;
  width: 100%;
}

/* ── Big Timer ── */
.timer-display {
  text-align: center;
  margin-bottom: 1.5rem;
}

.timer-digits {
  font-size: clamp(4.5rem, 18vw, 7rem);
  font-weight: 700;
  letter-spacing: -0.03em;
  line-height: 1;
  font-variant-numeric: tabular-nums;
  color: #fff;
  text-shadow: 0 0 40px rgba(255,200,80,0.35), 0 2px 8px rgba(0,0,0,0.5);
  transition: color 0.4s;
}

.timer-digits.break-mode { color: #7fe0b8; text-shadow: 0 0 40px rgba(80,200,140,0.4); }
.timer-digits.warning    { color: #ffb347; text-shadow: 0 0 40px rgba(255,160,50,0.5); }

.timer-label {
  font-size: 0.82rem;
  color: rgba(255,255,255,0.38);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-top: 0.4rem;
}

/* Progress ring */
.ring-wrap {
  display: flex;
  justify-content: center;
  margin-bottom: 1.2rem;
}

#progress-ring {
  transform: rotate(-90deg);
}

.ring-bg { fill: none; stroke: rgba(255,255,255,0.08); stroke-width: 5; }
.ring-fill { fill: none; stroke-width: 5; stroke-linecap: round; transition: stroke-dashoffset 0.5s ease, stroke 0.4s; }

/* ── Controls ── */
.controls {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin-bottom: 1.2rem;
  flex-wrap: wrap;
}

.btn {
  padding: 11px 24px;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  transition: opacity 0.15s, transform 0.1s;
}
.btn:active { transform: scale(0.96); }

.btn-primary {
  background: linear-gradient(135deg, #f0a830, #c47c10);
  color: #fff;
  min-width: 110px;
}
.btn-primary:hover { opacity: 0.88; }

.btn-sec {
  background: rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.75);
  border: 0.5px solid rgba(255,255,255,0.15);
}
.btn-sec:hover { background: rgba(255,255,255,0.16); }

/* ── Mode tabs ── */
.mode-tabs {
  display: flex;
  gap: 6px;
  justify-content: center;
  margin-bottom: 1.2rem;
  flex-wrap: wrap;
}

.mode-tab {
  padding: 7px 16px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  border: 0.5px solid rgba(255,255,255,0.14);
  background: rgba(255,255,255,0.06);
  color: rgba(255,255,255,0.55);
  transition: all 0.2s;
}
.mode-tab.active {
  background: rgba(240,168,48,0.22);
  border-color: rgba(240,168,48,0.45);
  color: #f0c060;
}

/* ── Custom time input ── */
.custom-row {
  display: flex;
  gap: 8px;
  align-items: center;
  justify-content: center;
  margin-bottom: 1rem;
}

.custom-row label {
  font-size: 12px;
  color: rgba(255,255,255,0.38);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  white-space: nowrap;
}

.inp-small {
  width: 68px;
  padding: 8px 10px;
  border: 0.5px solid rgba(255,255,255,0.14);
  border-radius: 8px;
  font-size: 14px;
  background: rgba(255,255,255,0.07);
  color: #f0efe8;
  outline: none;
  text-align: center;
}
.inp-small:focus { border-color: rgba(240,168,48,0.5); }

.btn-set-time {
  padding: 8px 14px;
  border: 0.5px solid rgba(255,255,255,0.18);
  border-radius: 8px;
  background: rgba(255,255,255,0.08);
  color: rgba(255,255,255,0.65);
  font-size: 13px;
  cursor: pointer;
}
.btn-set-time:hover { background: rgba(255,255,255,0.14); }

/* ── Pomodoro toggle ── */
.pomo-row {
  display: flex;
  align-items: center;
  gap: 10px;
  justify-content: center;
  padding: 10px 14px;
  background: rgba(255,255,255,0.04);
  border-radius: 10px;
  border: 0.5px solid rgba(255,255,255,0.08);
}

.pomo-row label {
  font-size: 13px;
  color: rgba(255,255,255,0.55);
  cursor: pointer;
  user-select: none;
}

.toggle {
  position: relative;
  width: 40px;
  height: 22px;
  cursor: pointer;
}
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-track {
  position: absolute;
  inset: 0;
  border-radius: 22px;
  background: rgba(255,255,255,0.12);
  transition: background 0.25s;
}
.toggle input:checked ~ .toggle-track { background: #f0a830; }
.toggle-thumb {
  position: absolute;
  width: 16px; height: 16px;
  top: 3px; left: 3px;
  border-radius: 50%;
  background: #fff;
  transition: transform 0.25s;
}
.toggle input:checked ~ .toggle-thumb { transform: translateX(18px); }

.pomo-settings {
  display: none;
  margin-top: 0.8rem;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
}
.pomo-settings.visible { display: flex; }

.pomo-chip {
  padding: 6px 14px;
  border-radius: 8px;
  font-size: 12px;
  color: rgba(255,255,255,0.5);
  border: 0.5px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.05);
  cursor: pointer;
  transition: all 0.2s;
}
.pomo-chip.active {
  background: rgba(127,224,184,0.18);
  border-color: rgba(127,224,184,0.4);
  color: #7fe0b8;
}

/* ── Session counter ── */
.session-dots {
  display: flex;
  gap: 8px;
  justify-content: center;
  margin-top: 0.6rem;
}
.dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: rgba(255,255,255,0.14);
  transition: background 0.3s;
}
.dot.done { background: #f0a830; }

/* ── Notification toast ── */
#toast {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 200;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 2rem 1.5rem 2.5rem;
  background: rgba(5,5,18,0.96);
  backdrop-filter: blur(20px);
  text-align: center;
  transform: translateY(-100%);
  transition: transform 0.45s cubic-bezier(0.34,1.2,0.64,1);
  border-bottom: 0.5px solid rgba(255,255,255,0.1);
}
#toast.show { transform: translateY(0); }

.toast-emoji { font-size: 2.8rem; margin-bottom: 0.5rem; }
.toast-title { font-size: 1.4rem; font-weight: 700; color: #f0c060; margin-bottom: 0.4rem; }
.toast-msg   { font-size: 1rem; color: rgba(255,255,255,0.7); margin-bottom: 0.6rem; max-width: 480px; }
.toast-quote { font-size: 0.88rem; color: rgba(255,255,255,0.45); font-style: italic; margin-bottom: 1.2rem; max-width: 420px; }
.toast-btn {
  padding: 10px 28px;
  border: none; border-radius: 10px;
  background: linear-gradient(135deg,#f0a830,#c47c10);
  color: #fff; font-size: 14px; font-weight: 500;
  cursor: pointer;
}

/* ── Confetti canvas ── */
#confetti {
  position: fixed;
  inset: 0;
  z-index: 190;
  pointer-events: none;
}

/* ── Footer watermark ── */
.watermark {
  position: fixed;
  bottom: 14px; right: 18px;
  z-index: 10;
  font-size: 11px;
  color: rgba(255,255,255,0.2);
  letter-spacing: 0.04em;
  user-select: none;
}

@media(max-width:480px){
  .card { padding: 1.5rem 1.2rem; }
  .btn { padding: 10px 18px; font-size: 14px; }
}
</style>
</head>

<!-- Confetti -->
<canvas id="confetti"></canvas>

<!-- Toast notification -->
<div id="toast">
  <div class="toast-emoji" id="t-emoji">🎉</div>
  <div class="toast-title" id="t-title">Session Complete!</div>
  <div class="toast-msg"   id="t-msg">Great work! Take a break.</div>
  <div class="toast-quote" id="t-quote"></div>
  <button class="toast-btn" onclick="closeToast()">Continue →</button>
</div>

<!-- Main -->
<div class="page">

  <header>
    <h1>Study Timer</h1>
    <p>Stay focused. Trust the process.</p>
  </header>

  <!-- Mode tabs -->
  <div class="mode-tabs">
    <button class="mode-tab active" onclick="setMode('focus')">Focus</button>
    <button class="mode-tab" onclick="setMode('short')">Short Break</button>
    <button class="mode-tab" onclick="setMode('long')">Long Break</button>
    <button class="mode-tab" onclick="setMode('custom')">Custom</button>
  </div>

  <div class="card">

    <!-- Progress ring + digits -->
    <div class="ring-wrap">
      <svg id="progress-ring" width="220" height="220" viewBox="0 0 220 220">
        <circle class="ring-bg" cx="110" cy="110" r="98"/>
        <circle class="ring-fill" id="ring-fill" cx="110" cy="110" r="98"
          stroke-dasharray="615.75" stroke-dashoffset="0" stroke="#f0a830"/>
      </svg>
    </div>

    <div class="timer-display" style="margin-top:-188px; position:relative; z-index:1;">
      <div class="timer-digits" id="digits">25:00</div>
      <div class="timer-label" id="timer-label">Focus Session</div>
    </div>

    <div style="height:24px;"></div>

    <!-- Custom time row -->
    <div class="custom-row" id="custom-row" style="display:none;">
      <label>Min</label>
      <input class="inp-small" type="number" id="custom-min" value="45" min="1" max="180"/>
      <label>Sec</label>
      <input class="inp-small" type="number" id="custom-sec" value="0" min="0" max="59"/>
      <button class="btn-set-time" onclick="applyCustom()">Set</button>
    </div>

    <!-- Controls -->
    <div class="controls">
      <button class="btn btn-primary" id="start-btn" onclick="toggleTimer()">Start</button>
      <button class="btn btn-sec" onclick="resetTimer()">Reset</button>
      <button class="btn btn-sec" onclick="skipTimer()">Skip →</button>
    </div>

    <!-- Pomodoro toggle -->
    <div class="pomo-row">
      <label for="pomo-toggle">Pomodoro mode</label>
      <label class="toggle">
        <input type="checkbox" id="pomo-toggle" onchange="togglePomo()"/>
        <span class="toggle-track"></span>
        <span class="toggle-thumb"></span>
      </label>
      <span style="font-size:12px;color:rgba(255,255,255,0.3);" id="pomo-status">Off</span>
    </div>

    <div class="pomo-settings" id="pomo-settings">
      <div style="width:100%;text-align:center;font-size:12px;color:rgba(255,255,255,0.35);margin-bottom:4px;">Cycle: Focus → Short Break × 3 → Long Break</div>
      <button class="pomo-chip active" onclick="setPomoPreset(25,5,15,this)">25/5/15</button>
      <button class="pomo-chip" onclick="setPomoPreset(50,10,20,this)">50/10/20</button>
      <button class="pomo-chip" onclick="setPomoPreset(90,15,30,this)">90/15/30</button>
    </div>

    <!-- Session dots -->
    <div class="session-dots" id="session-dots" style="display:none;">
      <div class="dot" id="d0"></div>
      <div class="dot" id="d1"></div>
      <div class="dot" id="d2"></div>
      <div class="dot" id="d3"></div>
    </div>

  </div>
</div>

<div class="watermark">limited to sr56</div>

<script>
/* ═══════ DATA ═══════ */
const QUOTES = [
  ["The secret of getting ahead is getting started.", "Mark Twain"],
  ["It always seems impossible until it's done.", "Nelson Mandela"],
  ["Focus is the art of knowing what to ignore.", "James Clear"],
  ["Small daily improvements lead to stunning results.", "Robin Sharma"],
  ["Discipline is choosing between what you want now and what you want most.", "Abraham Lincoln"],
  ["The expert in anything was once a beginner.", "Helen Hayes"],
  ["You don't have to be great to start, but you have to start to be great.", "Zig Ziglar"],
  ["Success is the sum of small efforts repeated day in and day out.", "Robert Collier"],
  ["Work hard in silence, let your success be your noise.", "Frank Ocean"],
  ["The pain of discipline is far less than the pain of regret.", "Jim Rohn"],
  ["Push yourself because no one else is going to do it for you.", "Anonymous"],
  ["Great things never come from comfort zones.", "Roy T. Bennett"],
  ["Believe you can and you're halfway there.", "Theodore Roosevelt"],
  ["Don't watch the clock; do what it does. Keep going.", "Sam Levenson"],
  ["Your only limit is your mind.", "Anonymous"],
  ["One hour of focused work beats eight hours of distraction.", "Cal Newport"],
  ["Stay hard. Stay focused. Embrace the grind.", "David Goggins"],
  ["Every session is a deposit into your future.", "Anonymous"],
  ["Lord Venkateswara blesses those who persevere.", "Ancient wisdom"],
  ["The mountain does not care how fast you climb, only that you do.", "Ancient wisdom"],
];

const CONGRATS = [
  { emoji: "🔥", title: "Session Complete!", msg: "Rammy is proud of you!" },
  { emoji: "⚡", title: "Crushing it!", msg: "Another session done. You're unstoppable." },
  { emoji: "🏆", title: "Champion!", msg: "That session was yours. Claim it." },
  { emoji: "🙏", title: "Blessed effort!", msg: "Lord Venkateswara sees your dedication." },
  { emoji: "💪", title: "Power through!", msg: "Your future self thanks you." },
  { emoji: "🌟", title: "Star performer!", msg: "Consistency is your superpower." },
  { emoji: "🎯", title: "Bullseye!", msg: "Locked in. Levelling up. That's you." },
];

const BREAK_MSGS = [
  { emoji: "☕", title: "Break time!", msg: "Rest is part of the process. Breathe." },
  { emoji: "🌿", title: "Recharge!", msg: "Step away, your brain is consolidating." },
  { emoji: "🧘", title: "Relax a moment", msg: "Stillness sharpens the mind." },
];

/* ═══════ MODES ═══════ */
const MODES = {
  focus:  { label: 'Focus Session',   min: 25, sec: 0,  isBreak: false },
  short:  { label: 'Short Break',     min: 5,  sec: 0,  isBreak: true  },
  long:   { label: 'Long Break',      min: 15, sec: 0,  isBreak: true  },
  custom: { label: 'Custom Session',  min: 45, sec: 0,  isBreak: false },
};

/* ═══════ STATE ═══════ */
let currentMode = 'focus';
let totalSecs = 25*60;
let remainSecs = 25*60;
let running = false;
let interval = null;

// Pomodoro
let pomoOn = false;
let pomoFocus = 25, pomoShort = 5, pomoLong = 15;
let pomoCycle = ['focus','short','focus','short','focus','short','focus','long'];
let pomoCycleLabels = ['Focus','Short Break','Focus','Short Break','Focus','Short Break','Focus','Long Break'];
let pomoIdx = 0;
let pomoSessionsDone = 0;

/* ═══════ TIMER CORE ═══════ */
function toggleTimer() {
  if (running) pause(); else start();
}

function start() {
  running = true;
  document.getElementById('start-btn').textContent = 'Pause';
  interval = setInterval(tick, 1000);
}

function pause() {
  running = false;
  document.getElementById('start-btn').textContent = 'Resume';
  clearInterval(interval);
}

function resetTimer() {
  pause();
  document.getElementById('start-btn').textContent = 'Start';
  loadMode(currentMode);
}

function skipTimer() {
  pause();
  document.getElementById('start-btn').textContent = 'Start';
  if (pomoOn) advancePomo();
  else loadMode(currentMode);
}

function tick() {
  if (remainSecs <= 0) {
    onComplete();
    return;
  }
  remainSecs--;
  render();
}

function onComplete() {
  pause();
  document.getElementById('start-btn').textContent = 'Start';
  playBeep();
  fireConfetti();

  const isBreak = MODES[currentMode]?.isBreak || false;
  const pool = isBreak ? BREAK_MSGS : CONGRATS;
  const pick = pool[Math.floor(Math.random()*pool.length)];
  const q = QUOTES[Math.floor(Math.random()*QUOTES.length)];

  document.getElementById('t-emoji').textContent = pick.emoji;
  document.getElementById('t-title').textContent = pick.title;
  document.getElementById('t-msg').textContent   = pick.msg;
  document.getElementById('t-quote').textContent = '\u201c' + q[0] + '\u201d \u2014 ' + q[1];
  document.getElementById('toast').classList.add('show');

  if (pomoOn) {
    if (!isBreak) {
      pomoSessionsDone++;
      updateDots();
    }
    advancePomo();
  } else {
    remainSecs = totalSecs;
    render();
  }
}

function closeToast() {
  document.getElementById('toast').classList.remove('show');
}

/* ═══════ RENDER ═══════ */
function render() {
  const m = Math.floor(remainSecs / 60);
  const s = remainSecs % 60;
  const el = document.getElementById('digits');
  el.textContent = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');

  const isBreak = MODES[currentMode]?.isBreak || false;
  el.className = 'timer-digits' + (isBreak ? ' break-mode' : '') + (remainSecs <= 30 && remainSecs > 0 && !isBreak ? ' warning' : '');

  // Ring
  const pct = totalSecs > 0 ? remainSecs / totalSecs : 0;
  const circ = 2 * Math.PI * 98;
  const ring = document.getElementById('ring-fill');
  ring.style.strokeDashoffset = circ * (1 - pct);
  ring.style.stroke = isBreak ? '#7fe0b8' : (remainSecs <= 30 ? '#ffb347' : '#f0a830');

  // Page title
  document.title = el.textContent + ' — Study Timer';
}

/* ═══════ MODES ═══════ */
function setMode(mode) {
  pause();
  document.getElementById('start-btn').textContent = 'Start';
  currentMode = mode;
  document.querySelectorAll('.mode-tab').forEach((t,i)=>{
    t.classList.toggle('active', ['focus','short','long','custom'][i]===mode);
  });
  document.getElementById('custom-row').style.display = mode==='custom' ? 'flex' : 'none';
  if (mode !== 'custom') loadMode(mode);
}

function loadMode(mode) {
  const m = MODES[mode];
  totalSecs = m.min*60 + m.sec;
  remainSecs = totalSecs;
  document.getElementById('timer-label').textContent = m.label;
  render();
}

function applyCustom() {
  const m = parseInt(document.getElementById('custom-min').value)||0;
  const s = parseInt(document.getElementById('custom-sec').value)||0;
  MODES.custom.min = m; MODES.custom.sec = s;
  MODES.custom.label = m + 'm ' + (s?s+'s ':' ') + 'Session';
  totalSecs = m*60+s;
  remainSecs = totalSecs;
  document.getElementById('timer-label').textContent = MODES.custom.label;
  render();
}

/* ═══════ POMODORO ═══════ */
function togglePomo() {
  pomoOn = document.getElementById('pomo-toggle').checked;
  document.getElementById('pomo-status').textContent = pomoOn ? 'On' : 'Off';
  document.getElementById('pomo-settings').classList.toggle('visible', pomoOn);
  document.getElementById('session-dots').style.display = pomoOn ? 'flex' : 'none';
  if (pomoOn) {
    pomoIdx = 0; pomoSessionsDone = 0;
    updateDots();
    applyPomoCycle();
  } else {
    loadMode('focus');
  }
}

function setPomoPreset(f,s,l,el) {
  pomoFocus=f; pomoShort=s; pomoLong=l;
  MODES.focus.min=f; MODES.short.min=s; MODES.long.min=l;
  document.querySelectorAll('.pomo-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  if (pomoOn) { pomoIdx=0; applyPomoCycle(); }
}

function applyPomoCycle() {
  pause();
  document.getElementById('start-btn').textContent = 'Start';
  const modeKey = pomoCycle[pomoIdx % pomoCycle.length];
  currentMode = modeKey;
  // Update tab highlight
  document.querySelectorAll('.mode-tab').forEach((t,i)=>{
    t.classList.toggle('active', ['focus','short','long','custom'][i]===modeKey);
  });
  document.getElementById('custom-row').style.display = 'none';
  loadMode(modeKey);
  document.getElementById('timer-label').textContent = pomoCycleLabels[pomoIdx % pomoCycle.length];
}

function advancePomo() {
  pomoIdx = (pomoIdx+1) % pomoCycle.length;
  applyPomoCycle();
}

function updateDots() {
  for (let i=0;i<4;i++) {
    document.getElementById('d'+i).classList.toggle('done', i < (pomoSessionsDone%4));
  }
}

/* ═══════ SOUND ═══════ */
function playBeep() {
  try {
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const notes = [523, 659, 784, 1047];
    notes.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = freq;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0.18, ctx.currentTime + i*0.18);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i*0.18 + 0.35);
      osc.start(ctx.currentTime + i*0.18);
      osc.stop(ctx.currentTime + i*0.18 + 0.4);
    });
  } catch(e) {}
}

/* ═══════ CONFETTI ═══════ */
function fireConfetti() {
  const canvas = document.getElementById('confetti');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  const colors = ['#f0a830','#7fe0b8','#afa9ec','#fff','#f7c1c1','#fac775','#85b7eb'];
  const pieces = Array.from({length:130},()=>({
    x: Math.random()*canvas.width,
    y: -20 - Math.random()*150,
    r: 3+Math.random()*6,
    d: 2.5+Math.random()*3,
    color: colors[Math.floor(Math.random()*colors.length)],
    angle: 0, tiltSpeed: 0.1+Math.random()*0.3, tilt: 0
  }));
  let frame=0;
  function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p=>{
      p.angle += p.tiltSpeed;
      p.tilt = Math.sin(p.angle)*12;
      p.y += p.d;
      p.x += Math.sin(p.angle)*1.1;
      ctx.beginPath();
      ctx.lineWidth=p.r/2;
      ctx.strokeStyle=p.color;
      ctx.moveTo(p.x+p.tilt+p.r/4, p.y);
      ctx.lineTo(p.x+p.tilt, p.y+p.tilt+p.r/4);
      ctx.stroke();
    });
    frame++;
    if(frame<200) requestAnimationFrame(draw);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  draw();
}

/* ═══════ INIT ═══════ */
loadMode('focus');
</script>
</body>
</html>
